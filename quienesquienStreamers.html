<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Memory Wikipedia PRO</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

button{margin:5px;padding:10px;}

.grid{
  display:grid;
  gap:6px;
  justify-content:center;
  margin-top:20px;
}

.card{
  width:80px;
  height:80px;
  background:#333;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:100%;
  display:none;
}

.flipped img{display:block;}
</style>
</head>

<body>

<h1>🎮 Memory Wikipedia (FIX 40)</h1>

<button onclick="start(10)">🟢 Fácil</button>
<button onclick="start(20)">🟡 Medio</button>
<button onclick="start(40)">🔴 PRO</button>

<p id="status">Pulsa un nivel</p>

<div class="grid" id="game"></div>

<script>

// 🔥 LISTA GRANDE (para asegurar 40)
const names = [
"Ibai Llanos","AuronPlay","El Rubius","TheGrefg","ElXokas","IlloJuan",
"MrBeast","KSI","PewDiePie","Charli D'Amelio","Addison Rae","Khaby Lame",
"Logan Paul","Emma Chamberlain","Markiplier","Ludwig Ahgren",
"Vegetta777","Willyrex","Cristinini","JuanSGuarnizo",
"Ninja","Shroud","Pokimane","Dream","Sapnap","TommyInnit",
"Quackity","Amouranth","HasanAbi","xQc","Adin Ross","Kai Cenat",
"Speed","iShowSpeed","Valkyrae","Sykkuno","Disguised Toast",
"NickMercs","TimTheTatman","DrLupo","Summit1g","Tfue",
"GeorgeNotFound","Ranboo","Corpse Husband","Bella Poarch",
"Zach King","Brent Rivera","Noah Beck","Dixie D'Amelio",
"Lil Huddy","James Charles","Jeffree Star","David Dobrik",
"Jake Paul","Liza Koshy","Lele Pons","Rudy Mancuso"
];

// 🔍 Wikipedia API
async function getWikiImage(name){
  try{
    const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`);
    const data = await res.json();

    if(data.thumbnail){
      return {name, img: data.thumbnail.source};
    }
  }catch(e){}

  return null;
}

// 🚀 INICIO
async function start(level){

  const game=document.getElementById("game");
  const status=document.getElementById("status");

  game.innerHTML="";
  status.innerText="Cargando imágenes...";

  // ⚡ CARGA EN PARALELO
  const results = await Promise.all(names.map(n => getWikiImage(n)));

  // filtrar válidos
  let people = results.filter(x => x !== null);

  // asegurar cantidad
  if(people.length < level){
    status.innerText = "No hay suficientes imágenes disponibles 😢";
    return;
  }

  // cortar al nivel
  people = people.slice(0, level);

  status.innerText="¡Empieza!";

  let selected=[];
  let lock=false;

  let cards=[...people,...people];
  cards.sort(()=>Math.random()-0.5);

  game.style.gridTemplateColumns=`repeat(${Math.ceil(Math.sqrt(cards.length))},80px)`;

  cards.forEach(p=>{
    const card=document.createElement("div");
    card.classList.add("card");

    const img=document.createElement("img");
    img.src=p.img;

    card.appendChild(img);

    card.onclick=()=>{
      if(lock||card.classList.contains("flipped")) return;

      card.classList.add("flipped");
      selected.push(card);

      if(selected.length===2){
        lock=true;

        setTimeout(()=>{
          const[a,b]=selected;

          if(a.querySelector("img").src !== b.querySelector("img").src){
            a.classList.remove("flipped");
            b.classList.remove("flipped");
          }

          selected=[];
          lock=false;
        },600);
      }
    };

    game.appendChild(card);
  });
}

</script>

</body>
</html>
