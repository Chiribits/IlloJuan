<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Memory Influencers PRO</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0b0b0b;
  color: white;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

.grid {
  display: grid;
  gap: 6px;
  justify-content: center;
  margin-top: 20px;
}

.card {
  width: 70px;
  height: 70px;
  background: #333;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 100%;
  display: none;
}

.flipped img {
  display: block;
}
</style>
</head>

<body>

<h1>🎮 Memory PRO Influencers</h1>

<button onclick="start(10)">🟢 Fácil</button>
<button onclick="start(20)">🟡 Medio</button>
<button onclick="start(40)">🔴 PRO</button>

<div class="grid" id="game"></div>

<script>

// 🎯 20 influencers reales (duplicados = 40 cartas)
const people = [
  "ibai","auron","rubius","grefg","xokas","illojuan","cristinini","juans",
  "vegetta","willyrex","mrbeast","ksi","loganpaul","pewdiepie","markiplier",
  "emma","charli","addison","domelipa","khaby"
];

// 🖼️ imágenes seguras (fallback genérico estilo avatar)
function getImg(name){
  return `https://picsum.photos/seed/${name}/100`;
}

let selected = [];
let lock = false;

function start(level){

  const game = document.getElementById("game");
  game.innerHTML = "";

  selected = [];
  lock = false;

  let chosen = people.slice(0, level);

  let cards = [...chosen, ...chosen];

  cards.sort(() => 0.5 - Math.random());

  let size = Math.sqrt(cards.length);
  game.style.gridTemplateColumns = `repeat(${Math.ceil(size)}, 70px)`;

  cards.forEach(name => {

    const card = document.createElement("div");
    card.classList.add("card");

    const img = document.createElement("img");
    img.src = getImg(name);

    card.appendChild(img);

    card.addEventListener("click", () => {
      if(lock || card.classList.contains("flipped")) return;

      card.classList.add("flipped");
      selected.push(card);

      if(selected.length === 2){
        lock = true;
        setTimeout(check, 600);
      }
    });

    game.appendChild(card);
  });
}

function check(){
  const [a,b] = selected;

  if(a.querySelector("img").src !== b.querySelector("img").src){
    a.classList.remove("flipped");
    b.classList.remove("flipped");
  }

  selected = [];
  lock = false;
}

</script>

</body>
</html>
