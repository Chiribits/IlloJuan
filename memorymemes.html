<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Memory Memes</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

button{margin:5px;padding:10px;}

.grid{
  display:grid;
  gap:6px;
  justify-content:center;
  margin-top:20px;
}

.card{
  width:90px;
  height:90px;
  background:#333;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

.flipped img{display:block;}
</style>
</head>

<body>

<h1>😂 Memory de Memes</h1>

<button onclick="start(10)">🟢 Fácil</button>
<button onclick="start(20)">🟡 Medio</button>
<button onclick="start(40)">🔴 PRO</button>

<p id="status">Pulsa un nivel</p>

<div class="grid" id="game"></div>

<script>

async function getMemes(n){
  let memes = [];

  while(memes.length < n){
    try{
      const res = await fetch("https://meme-api.com/gimme/50");
      const data = await res.json();

      data.memes.forEach(m => {
        if(memes.length < n){
          memes.push(m.url);
        }
      });

    }catch(e){}
  }

  return memes;
}

async function start(level){

  const game=document.getElementById("game");
  const status=document.getElementById("status");

  game.innerHTML="";
  status.innerText="Cargando memes...";

  const memes = await getMemes(level);

  status.innerText="¡Empieza!";

  let selected=[];
  let lock=false;

  let cards=[...memes,...memes];
  cards.sort(()=>Math.random()-0.5);

  game.style.gridTemplateColumns=`repeat(${Math.ceil(Math.sqrt(cards.length))},90px)`;

  cards.forEach(src=>{

    const card=document.createElement("div");
    card.classList.add("card");

    const img=document.createElement("img");
    img.src=src;

    card.appendChild(img);

    card.onclick=()=>{
      if(lock||card.classList.contains("flipped")) return;

      card.classList.add("flipped");
      selected.push(card);

      if(selected.length===2){
        lock=true;

        setTimeout(()=>{
          const[a,b]=selected;

          if(a.querySelector("img").src !== b.querySelector("img").src){
            a.classList.remove("flipped");
            b.classList.remove("flipped");
          }

          selected=[];
          lock=false;
        },700);
      }
    };

    game.appendChild(card);
  });
}

</script>

</body>
</html>
