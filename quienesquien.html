<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quién es Quién Streamers</title>

<style>
body{
font-family:sans-serif;
background:#0d0d0d;
color:white;
text-align:center;
margin:0;
padding:10px;
}

h1{
color:#ff4444;
margin-bottom:5px;
}

#grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
max-width:500px;
margin:20px auto;
}

.card{
background:#1f1f1f;
border:2px solid #333;
border-radius:10px;
padding:8px;
cursor:pointer;
transition:0.2s;
user-select:none;
font-size:12px;
}

.card img{
width:100%;
border-radius:8px;
height:80px;
object-fit:cover;
}

.card.eliminado{
opacity:0.2;
transform:scale(0.95);
background:#000;
text-decoration:line-through;
}

button{
margin-top:10px;
padding:10px 18px;
border:none;
border-radius:8px;
background:#ff4444;
color:white;
font-weight:bold;
cursor:pointer;
}

#msg{
margin-top:10px;
min-height:20px;
}
</style>
</head>

<body>

<h1>¿QUIÉN ES QUIÉN? STREAMERS</h1>
<p>Adivina el streamer secreto eliminando los demás</p>

<div id="grid"></div>

<button onclick="guess()">Adivinar</button>
<button onclick="init()">Nuevo juego</button>

<div id="msg"></div>

<script>
const STREAMERS = [
{
name:"Auronplay",
img:"https://i.imgur.com/1Q9Z1ZQ.jpeg",
hint:"Humor, Twitch y bromas"
},
{
name:"Ibai",
img:"https://i.imgur.com/8QZ4x1p.jpeg",
hint:"Eventos gigantes y charlas"
},
{
name:"TheGrefg",
img:"https://i.imgur.com/5QeZb6h.jpeg",
hint:"Fortnite y récords mundiales"
},
{
name:"IlloJuan",
img:"https://i.imgur.com/9m1Xz7k.jpeg",
hint:"Andaluz, GTA y humor"
},
{
name:"ElRubius",
img:"https://i.imgur.com/qX3Z9aF.jpeg",
hint:"Veterano de YouTube gaming"
},
{
name:"ElXokas",
img:"https://i.imgur.com/3kZp7sB.jpeg",
hint:"Energía máxima y rants"
}
];

let secret;

function init(){
document.getElementById("msg").textContent="";
const grid=document.getElementById("grid");
grid.innerHTML="";

secret = STREAMERS[Math.floor(Math.random()*STREAMERS.length)];

STREAMERS.forEach((s,i)=>{
const div=document.createElement("div");
div.className="card";
div.onclick=()=>toggle(div);

div.innerHTML=`
<img src="${s.img}">
<div>${s.name}</div>
`;

grid.appendChild(div);
});
}

function toggle(el){
el.classList.toggle("eliminado");
}

function guess(){
const visible=[...document.querySelectorAll(".card:not(.eliminado)")];

if(visible.length===1){
const name=visible[0].innerText.trim();

if(name===secret.name){
document.getElementById("msg").textContent="🎉 ¡Correcto! Era "+secret.name;
}else{
document.getElementById("msg").textContent="❌ No era... era "+secret.name;
}
}else{
document.getElementById("msg").textContent="Tienes que dejar solo uno 👀";
}
}

init();
</script>

</body>
</html>
