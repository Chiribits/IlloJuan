<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Memory Gatitos PRO 🐱</title>

<style>
body{
  background:#fff0f5;
  font-family:Arial;
  text-align:center;
}

h1{
  color:#ff4d6d;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.grid{
  display:grid;
  gap:8px;
  justify-content:center;
  margin-top:20px;
}

.card{
  width:90px;
  height:90px;
  background:#ffc0cb;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

.flipped img{
  display:block;
}
</style>

</head>

<body>

<h1>🐱 Memory de Caras de Gatitos</h1>

<button onclick="start(10)">🟢 Fácil</button>
<button onclick="start(20)">🟡 Medio</button>
<button onclick="start(40)">🔴 PRO</button>

<p id="status">Elige dificultad</p>

<div class="grid" id="game"></div>

<script>

// 🐱 obtener SOLO caras y rellenar hasta n
async function getCatFaces(n){

  let images = new Set();

  while(images.size < n){
    try{
      const res = await fetch(
        `https://api.thecatapi.com/v1/images/search?limit=50&category_ids=5`
      );
      const data = await res.json();

      data.forEach(cat=>{
        if(cat.url) images.add(cat.url);
      });

    }catch(e){}
  }

  return Array.from(images).slice(0,n);
}

// 🎮 iniciar juego
async function start(level){

  const game=document.getElementById("game");
  const status=document.getElementById("status");

  game.innerHTML="";
  status.innerText="Cargando gatitos 🐱...";

  const cats = await getCatFaces(level);

  status.innerText="¡Encuentra las parejas!";

  let selected=[];
  let lock=false;

  let cards=[...cats,...cats];
  cards.sort(()=>Math.random()-0.5);

  game.style.gridTemplateColumns =
    `repeat(${Math.ceil(Math.sqrt(cards.length))},90px)`;

  cards.forEach(src=>{

    const card=document.createElement("div");
    card.classList.add("card");

    const img=document.createElement("img");
    img.src=src;

    card.appendChild(img);

    card.onclick=()=>{
      if(lock || card.classList.contains("flipped")) return;

      card.classList.add("flipped");
      selected.push(card);

      if(selected.length===2){
        lock=true;

        setTimeout(()=>{
          const[a,b]=selected;

          if(a.querySelector("img").src !== b.querySelector("img").src){
            a.classList.remove("flipped");
            b.classList.remove("flipped");
          }

          selected=[];
          lock=false;
        },700);
      }
    };

    game.appendChild(card);
  });
}

</script>

</body>
</html>
