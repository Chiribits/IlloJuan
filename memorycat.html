<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Memory de Gatitos 🐱</title>

<style>
body{
  background:#ffeef2;
  font-family:Arial;
  text-align:center;
}

h1{
  color:#ff6b81;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.grid{
  display:grid;
  gap:8px;
  justify-content:center;
  margin-top:20px;
}

.card{
  width:90px;
  height:90px;
  background:#ffb6c1;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

.flipped img{
  display:block;
}
</style>

</head>

<body>

<h1>🐱 Memory de Gatitos</h1>

<button onclick="start(10)">🟢 Fácil</button>
<button onclick="start(20)">🟡 Medio</button>
<button onclick="start(40)">🔴 PRO</button>

<p id="status">Elige dificultad</p>

<div class="grid" id="game"></div>

<script>

// 🐱 obtener gatos desde API
async function getCats(n){
  try{
    const res = await fetch(`https://api.thecatapi.com/v1/images/search?limit=${n}`);
    const data = await res.json();

    return data.map(cat => cat.url);

  }catch(e){
    alert("Error cargando gatitos 😢");
    return [];
  }
}

// 🎮 iniciar juego
async function start(level){

  const game = document.getElementById("game");
  const status = document.getElementById("status");

  game.innerHTML="";
  status.innerText="Cargando gatitos 🐱...";

  const cats = await getCats(level);

  if(cats.length < level){
    status.innerText="No se pudieron cargar suficientes gatos 😢";
    return;
  }

  status.innerText="¡Encuentra las parejas!";

  let selected=[];
  let lock=false;

  let cards=[...cats,...cats];
  cards.sort(()=>Math.random()-0.5);

  game.style.gridTemplateColumns = `repeat(${Math.ceil(Math.sqrt(cards.length))},90px)`;

  cards.forEach(src=>{

    const card=document.createElement("div");
    card.classList.add("card");

    const img=document.createElement("img");
    img.src=src;

    card.appendChild(img);

    card.onclick=()=>{
      if(lock || card.classList.contains("flipped")) return;

      card.classList.add("flipped");
      selected.push(card);

      if(selected.length===2){
        lock=true;

        setTimeout(()=>{
          const[a,b]=selected;

          if(a.querySelector("img").src !== b.querySelector("img").src){
            a.classList.remove("flipped");
            b.classList.remove("flipped");
          }

          selected=[];
          lock=false;
        },700);
      }
    };

    game.appendChild(card);
  });
}

</script>

</body>
</html>
