<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Puzzle Streamers</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}

#board {
  margin: 20px auto;
  display: grid;
  gap: 2px;
  width: 500px;
  height: 500px;
}

.tile {
  background-image: url("https://via.placeholder.com/500x500.png?text=Streamer");
  background-size: 500px 500px;
  cursor: pointer;
  border: 1px solid #000;
}

.controls {
  margin-top: 10px;
}

button, select {
  padding: 8px;
  margin: 5px;
}
</style>
</head>

<body>

<h1>🧩 Puzzle de Streamers</h1>

<div class="controls">
  <select id="size">
    <option value="3">Fácil (3x3)</option>
    <option value="4">Media (4x4)</option>
    <option value="5">Difícil (5x5)</option>
  </select>

  <button onclick="start()">Iniciar</button>
</div>

<div id="board"></div>
<p id="msg"></p>

<script>
let size = 3;
let tiles = [];
let first = null;

function start() {
  const board = document.getElementById("board");
  board.innerHTML = "";

  size = parseInt(document.getElementById("size").value);

  board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
  board.style.gridTemplateRows = `repeat(${size}, 1fr)`;

  tiles = [];

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {

      const tile = document.createElement("div");
      tile.classList.add("tile");

      tile.style.width = "100%";
      tile.style.height = "100%";

      tile.dataset.correct = y + "-" + x;

      tile.style.backgroundPosition =
        `${(x / (size - 1)) * 100}% ${(y / (size - 1)) * 100}%`;

      tile.addEventListener("click", () => select(tile));

      tiles.push(tile);
      board.appendChild(tile);
    }
  }

  shuffle(board);
  document.getElementById("msg").innerText = "";
}

function shuffle(board) {
  for (let i = board.children.length; i >= 0; i--) {
    board.appendChild(board.children[Math.random() * i | 0]);
  }
}

function select(tile) {
  if (!first) {
    first = tile;
    tile.style.outline = "2px solid yellow";
  } else {
    swap(first, tile);
    first.style.outline = "none";
    first = null;

    checkWin();
  }
}

function swap(a, b) {
  const parent = a.parentNode;
  const next = b.nextSibling;

  parent.insertBefore(a, next);
  parent.insertBefore(b, a);
}

function checkWin() {
  const board = document.getElementById("board");
  const current = [...board.children];

  let win = true;

  current.forEach((tile, i) => {
    const y = Math.floor(i / size);
    const x = i % size;

    const correct = y + "-" + x;

    if (tile.dataset.correct !== correct) {
      win = false;
    }
  });

  if (win) {
    document.getElementById("msg").innerText = "🎉 ¡Has ganado!";
  }
}

start();
</script>

</body>
</html>
