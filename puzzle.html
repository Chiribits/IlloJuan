<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Puzzle Streamers</title>
<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
}

canvas {
  margin-top: 15px;
  border: 2px solid #444;
  cursor: pointer;
}

select, button {
  padding: 8px;
  margin: 5px;
}
</style>
</head>
<body>

<h1>🧩 Puzzle de Streamers</h1>

<select id="size">
  <option value="3">Fácil (3x3)</option>
  <option value="4">Media (4x4)</option>
  <option value="5">Difícil (5x5)</option>
</select>

<button onclick="initGame()">Iniciar</button>

<canvas id="game"></canvas>
<p id="msg"></p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const img = new Image();

// 👇 imagen de ejemplo (puedes cambiarla por streamer real)
img.src = "https://via.placeholder.com/500x500.png?text=Streamer";

let size = 3;
let pieceSize;
let pieces = [];
let selected = null;
let ready = false;

img.onload = () => {
  ready = true;
  initGame(); // 🔥 importante: iniciar SOLO cuando la imagen carga
};

function initGame() {
  if (!ready) return;

  size = parseInt(document.getElementById("size").value);

  canvas.width = 500;
  canvas.height = 500;

  pieceSize = canvas.width / size;

  pieces = [];

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      pieces.push({
        correctX: x,
        correctY: y
      });
    }
  }

  shuffle(pieces);
  draw();
  document.getElementById("msg").innerText = "";
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  pieces.forEach((p, i) => {
    const x = (i % size) * pieceSize;
    const y = Math.floor(i / size) * pieceSize;

    ctx.drawImage(
      img,
      p.correctX * pieceSize,
      p.correctY * pieceSize,
      pieceSize,
      pieceSize,
      x,
      y,
      pieceSize,
      pieceSize
    );

    ctx.strokeStyle = "#000";
    ctx.strokeRect(x, y, pieceSize, pieceSize);
  });
}

canvas.addEventListener("click", (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / pieceSize);
  const y = Math.floor((e.clientY - rect.top) / pieceSize);

  const index = y * size + x;

  if (selected === null) {
    selected = index;
  } else {
    [pieces[selected], pieces[index]] = [pieces[index], pieces[selected]];
    selected = null;

    draw();
    checkWin();
  }
});

function checkWin() {
  let win = true;

  for (let i = 0; i < pieces.length; i++) {
    const p = pieces[i];
    const x = i % size;
    const y = Math.floor(i / size);

    if (p.correctX !== x || p.correctY !== y) {
      win = false;
      break;
    }
  }

  if (win) {
    document.getElementById("msg").innerText = "🎉 ¡Has ganado!";
  }
}
</script>

</body>
</html>
