<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Puzzle Streamers</title>
<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
}

.controls {
  margin: 10px;
}

canvas {
  margin-top: 10px;
  border: 2px solid #444;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>🧩 Puzzle de Streamers</h1>

<div class="controls">
  <select id="size">
    <option value="3">Fácil (3x3)</option>
    <option value="4">Media (4x4)</option>
    <option value="5">Difícil (5x5)</option>
  </select>
  <button onclick="startGame()">Iniciar</button>
</div>

<canvas id="game"></canvas>
<p id="msg"></p>

<script>
const imgSrc = "https://via.placeholder.com/500x500.png?text=Streamer";

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let img = new Image();
let pieces = [];
let size = 3;
let pieceSize;
let selected = null;

img.src = imgSrc;

function startGame() {
  size = parseInt(document.getElementById("size").value);
  pieces = [];
  selected = null;

  canvas.width = 500;
  canvas.height = 500;

  pieceSize = canvas.width / size;

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      pieces.push({
        x, y,
        correctX: x,
        correctY: y
      });
    }
  }

  shuffle(pieces);
  draw();
  document.getElementById("msg").innerText = "";
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  pieces.forEach((p, index) => {
    const x = (index % size) * pieceSize;
    const y = Math.floor(index / size) * pieceSize;

    ctx.drawImage(
      img,
      p.correctX * pieceSize,
      p.correctY * pieceSize,
      pieceSize,
      pieceSize,
      x,
      y,
      pieceSize,
      pieceSize
    );

    ctx.strokeStyle = "#000";
    ctx.strokeRect(x, y, pieceSize, pieceSize);
  });
}

canvas.addEventListener("click", (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / pieceSize);
  const y = Math.floor((e.clientY - rect.top) / pieceSize);

  const index = y * size + x;

  if (selected === null) {
    selected = index;
  } else {
    [pieces[selected], pieces[index]] = [pieces[index], pieces[selected]];
    selected = null;

    draw();
    checkWin();
  }
});

function checkWin() {
  let win = true;

  for (let i = 0; i < pieces.length; i++) {
    const p = pieces[i];
    const x = i % size;
    const y = Math.floor(i / size);

    if (p.correctX !== x || p.correctY !== y) {
      win = false;
      break;
    }
  }

  if (win) {
    document.getElementById("msg").innerText = "🎉 ¡Has ganado!";
  }
}

img.onload = () => startGame();
</script>

</body>
</html>
