<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Memory Princesas 👑</title>

<style>
body{
  background:#fff5f8;
  font-family:Arial;
  text-align:center;
}

h1{
  color:#d63384;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.grid{
  display:grid;
  gap:8px;
  justify-content:center;
  margin-top:20px;
}

.card{
  width:90px;
  height:90px;
  background:#ffcce0;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

.flipped img{
  display:block;
}
</style>

</head>

<body>

<h1>👑 Memory de Princesas</h1>

<button onclick="start(10)">🟢 Fácil</button>
<button onclick="start(20)">🟡 Medio</button>
<button onclick="start(40)">🔴 PRO</button>

<p id="status">Elige dificultad</p>

<div class="grid" id="game"></div>

<script>

// 👑 nombres para buscar en Wikipedia
const princesses = [
"Cinderella","Ariel","Belle","Jasmine","Snow White",
"Rapunzel","Elsa","Anna","Mulan","Tiana","Moana",
"Merida","Aurora","Pocahontas"
];

// 🔍 obtener imagen de Wikipedia
async function getImage(name){
  try{
    const res = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`
    );
    const data = await res.json();

    if(data.thumbnail){
      return data.thumbnail.source;
    }
  }catch(e){}

  return null;
}

// 👑 conseguir imágenes hasta llenar
async function getPrincesses(n){

  let images = new Set();

  while(images.size < n){
    for(let name of princesses){

      let img = await getImage(name);

      if(img) images.add(img);

      if(images.size >= n) break;
    }

    // fallback si faltan
    if(images.size < n){
      images.add(`https://picsum.photos/seed/princess${images.size}/100`);
    }
  }

  return Array.from(images).slice(0,n);
}

// 🎮 iniciar juego
async function start(level){

  const game=document.getElementById("game");
  const status=document.getElementById("status");

  game.innerHTML="";
  status.innerText="Cargando princesas 👑...";

  const imgs = await getPrincesses(level);

  status.innerText="¡Encuentra las parejas!";

  let selected=[];
  let lock=false;

  let cards=[...imgs,...imgs];
  cards.sort(()=>Math.random()-0.5);

  game.style.gridTemplateColumns =
    `repeat(${Math.ceil(Math.sqrt(cards.length))},90px)`;

  cards.forEach(src=>{

    const card=document.createElement("div");
    card.classList.add("card");

    const img=document.createElement("img");
    img.src=src;

    card.appendChild(img);

    card.onclick=()=>{
      if(lock || card.classList.contains("flipped")) return;

      card.classList.add("flipped");
      selected.push(card);

      if(selected.length===2){
        lock=true;

        setTimeout(()=>{
          const[a,b]=selected;

          if(a.querySelector("img").src !== b.querySelector("img").src){
            a.classList.remove("flipped");
            b.classList.remove("flipped");
          }

          selected=[];
          lock=false;
        },700);
      }
    };

    game.appendChild(card);
  });
}

</script>

</body>
</html>
