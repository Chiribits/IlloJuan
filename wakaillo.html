<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pacman IlloJuan vs Hacienda</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

#game {
  display: grid;
  grid-template-columns: repeat(21, 26px);
  grid-template-rows: repeat(21, 26px);
  margin: 20px auto;
  width: fit-content;
}

.cell {
  width: 26px;
  height: 26px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.wall {
  background: #1e3a8a;
}

/* puntos */
.dot {
  color: white;
  font-size: 10px;
}

/* PACMAN (VISIBLE SIEMPRE) */
.pacman {
  font-size: 18px;
}

/* FANTASMAS */
.ghost {
  font-size: 18px;
}
</style>
</head>

<body>

<h1>🟡 Pac-Man IlloJuan vs Hacienda</h1>

<div id="game"></div>
<p id="msg"></p>

<script>
const N = 21;

let map;
let pacman;
let ghosts;
let gameOver = false;

const game = document.getElementById("game");

// 🧱 MAPA ALEATORIO SIMPLE PERO JUGABLE
function generateMap() {
  let m = [];

  for (let y = 0; y < N; y++) {
    let row = [];

    for (let x = 0; x < N; x++) {
      if (x === 0 || y === 0 || x === N-1 || y === N-1) {
        row.push(1);
      } else {
        row.push(Math.random() < 0.12 ? 1 : 0);
      }
    }

    m.push(row);
  }

  return m;
}

// 🔎 celda libre segura
function freeCell() {
  let x, y;
  do {
    x = Math.floor(Math.random() * N);
    y = Math.floor(Math.random() * N);
  } while (map[y][x] === 1);

  return {x, y};
}

function init() {
  map = generateMap();

  pacman = freeCell();

  ghosts = [
    freeCell(),
    freeCell(),
    freeCell(),
    freeCell()
  ];

  gameOver = false;
  document.getElementById("msg").innerText = "";
}

// 🎮 DIBUJO (FIX IMPORTANTE)
function draw() {
  game.innerHTML = "";

  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {

      const cell = document.createElement("div");
      cell.classList.add("cell");

      // paredes
      if (map[y][x] === 1) {
        cell.classList.add("wall");
      }

      // punto (solo si no se ha comido)
      else if (map[y][x] === 0) {
        cell.classList.add("dot");
        cell.innerText = "•";
      }

      // PACMAN (👨‍🟡 IlloJuan emoji fallback)
      if (pacman.x === x && pacman.y === y) {
        cell.classList.add("pacman");
        cell.innerText = "🟡";
      }

      // FANTASMAS HACIENDA
      ghosts.forEach(g => {
        if (g.x === x && g.y === y) {
          cell.classList.add("ghost");
          cell.innerText = "🏛️";
        }
      });

      game.appendChild(cell);
    }
  }
}

// 👻 MOVIMIENTO
function moveGhosts() {
  ghosts.forEach(g => {
    const dirs = [
      {x:0,y:1},{x:0,y:-1},{x:1,y:0},{x:-1,y:0}
    ];

    const d = dirs[Math.floor(Math.random()*4)];
    const nx = g.x + d.x;
    const ny = g.y + d.y;

    if (map[ny] && map[ny][nx] !== 1) {
      g.x = nx;
      g.y = ny;
    }
  });
}

// 💀 MUERTE
function checkDeath() {
  ghosts.forEach(g => {
    if (g.x === pacman.x && g.y === pacman.y) {
      document.getElementById("msg").innerText = "💀 Hacienda te ha pillado";
      gameOver = true;
    }
  });
}

// 🟡 COMER PUNTOS (FIX PRINCIPAL)
function eat() {
  if (map[pacman.y][pacman.x] === 0) {
    map[pacman.y][pacman.x] = 2;
  }
}

// 🎮 MOVIMIENTO
document.addEventListener("keydown", e => {
  if (gameOver) return;

  let nx = pacman.x;
  let ny = pacman.y;

  if (e.key === "ArrowUp") ny--;
  if (e.key === "ArrowDown") ny++;
  if (e.key === "ArrowLeft") nx--;
  if (e.key === "ArrowRight") nx++;

  if (map[ny] && map[ny][nx] !== 1) {
    pacman.x = nx;
    pacman.y = ny;
    eat();
  }

  draw();
});

// loop
setInterval(() => {
  if (!gameOver) {
    moveGhosts();
    checkDeath();
    draw();
  }
}, 200);

// start
init();
draw();
</script>

</body>
</html>
