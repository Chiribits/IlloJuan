<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pacman IlloJuan Edition</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

#game {
  display: grid;
  grid-template-columns: repeat(21, 28px);
  grid-template-rows: repeat(21, 28px);
  margin: 20px auto;
  width: fit-content;
}

.cell {
  width: 28px;
  height: 28px;
}

.wall {
  background: #1e3a8a;
}

.dot {
  background: black;
  position: relative;
}

.dot::after {
  content: "";
  width: 5px;
  height: 5px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 11px;
  left: 11px;
}

.pacman {
  background-image: url("https://www.reddit.com/media?url=https%3A%2F%2Fpreview.redd.it%2Fxv2kv81vqwxa1.png%3Fwidth%3D1080%26crop%3Dsmart%26auto%3Dwebp%26s%3D71f3468e96c2355db74cd74ab0a2495f771bd6ba");
  background-size: cover;
}

.ghost {
  background: red;
  border-radius: 50%;
}

button {
  padding: 8px;
  margin-top: 10px;
  display: none;
}
</style>
</head>

<body>

<h1>🟡 Pac-Man IlloJuan Edition (MAPA GRANDE)</h1>

<div id="game"></div>
<p id="msg"></p>
<button id="restartBtn" onclick="resetGame()">🔄 Volver a empezar</button>

<script>
const N = 21;

let map;
let pacman;
let ghosts;
let gameOver = false;

const game = document.getElementById("game");

// 🧠 GENERAR MAPA GRANDE AUTOMÁTICAMENTE
function generateMap(size) {
  let m = [];

  for (let y = 0; y < size; y++) {
    let row = [];

    for (let x = 0; x < size; x++) {

      // bordes = paredes
      if (x === 0 || y === 0 || x === size-1 || y === size-1) {
        row.push(1);
      }
      // patrón de paredes internas
      else if (x % 4 === 0 && y % 2 !== 0) {
        row.push(1);
      }
      else if (y % 4 === 0 && x % 2 !== 0) {
        row.push(1);
      }
      else {
        row.push(0); // punto
      }
    }

    m.push(row);
  }

  return m;
}

function initState() {
  map = generateMap(N);

  pacman = { x: 1, y: 1 };

  ghosts = [
    { x: 19, y: 1 },
    { x: 19, y: 19 }
  ];

  gameOver = false;

  document.getElementById("msg").innerText = "";
  document.getElementById("restartBtn").style.display = "none";
}

// 🎮 DIBUJAR
function draw() {
  game.innerHTML = "";

  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {

      const cell = document.createElement("div");
      cell.classList.add("cell");

      if (map[y][x] === 1) {
        cell.classList.add("wall");
      } 
      else if (map[y][x] === 0) {
        cell.classList.add("dot");
      }

      if (pacman.x === x && pacman.y === y) {
        cell.classList.add("pacman");
      }

      ghosts.forEach(g => {
        if (g.x === x && g.y === y) {
          cell.classList.add("ghost");
        }
      });

      game.appendChild(cell);
    }
  }
}

// 👻 FANTASMAS RANDOM
function moveGhosts() {
  ghosts.forEach(g => {
    const dirs = [
      {x:0,y:1},
      {x:0,y:-1},
      {x:1,y:0},
      {x:-1,y:0}
    ];

    const d = dirs[Math.floor(Math.random() * 4)];
    const nx = g.x + d.x;
    const ny = g.y + d.y;

    if (map[ny][nx] !== 1) {
      g.x = nx;
      g.y = ny;
    }
  });
}

// 💀 MUERTE
function checkDeath() {
  ghosts.forEach(g => {
    if (g.x === pacman.x && g.y === pacman.y) {
      endGame("💀 GAME OVER");
    }
  });
}

// 🏆 VICTORIA
function checkWin() {
  let dots = 0;

  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {
      if (map[y][x] === 0) dots++;
    }
  }

  if (dots === 0) {
    endGame("🎉 ¡Has ganado el Pacman de IlloJuan!");
  }
}

function endGame(text) {
  gameOver = true;
  document.getElementById("msg").innerText = text;
  document.getElementById("restartBtn").style.display = "inline-block";
}

// 🎮 MOVIMIENTO
document.addEventListener("keydown", (e) => {
  if (gameOver) return;

  let nx = pacman.x;
  let ny = pacman.y;

  if (e.key === "ArrowUp") ny--;
  if (e.key === "ArrowDown") ny++;
  if (e.key === "ArrowLeft") nx--;
  if (e.key === "ArrowRight") nx++;

  if (map[ny][nx] !== 1) {
    pacman.x = nx;
    pacman.y = ny;

    if (map[ny][nx] === 0) {
      map[ny][nx] = 2;
    }
  }

  draw();
  checkWin();
});

// 🔁 LOOP
function loop() {
  if (!gameOver) {
    moveGhosts();
    draw();
    checkDeath();
  }
}

function resetGame() {
  initState();
  draw();
}

// INIT
initState();
draw();
setInterval(loop, 250);
</script>

</body>
</html>
