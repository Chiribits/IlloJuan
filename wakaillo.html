<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pacman IlloJuan Edition</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

#game {
  display: grid;
  grid-template-columns: repeat(21, 26px);
  grid-template-rows: repeat(21, 26px);
  margin: 20px auto;
  width: fit-content;
}

.cell {
  width: 26px;
  height: 26px;
  box-sizing: border-box;
}

/* paredes */
.wall {
  background: #1e3a8a;
}

/* puntos */
.dot {
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

.dot::after {
  content: "";
  width: 5px;
  height: 5px;
  background: white;
  border-radius: 50%;
}

/* pacman */
.pacman {
  background-image: url("https://upload.wikimedia.org/wikipedia/commons/8/8b/Logo_de_IlloJuan.png");
  background-size: cover;
  border-radius: 50%;
}

/* fantasmas hacienda */
.ghost {
  background-image: url("https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Agencia_Tributaria_logo.svg/2048px-Agencia_Tributaria_logo.svg.png");
  background-size: cover;
  border-radius: 50%;
}
</style>
</head>

<body>

<h1>🟡 Pac-Man IlloJuan vs Hacienda</h1>

<div id="game"></div>
<p id="msg"></p>

<script>
const N = 21;

let map = [];
let pacman;
let ghosts = [];
let gameOver = false;

const game = document.getElementById("game");

// 🧱 MAPA SEGURO (siempre jugable)
function generateMap() {
  const m = [];

  for (let y = 0; y < N; y++) {
    const row = [];
    for (let x = 0; x < N; x++) {

      if (x === 0 || y === 0 || x === N-1 || y === N-1) {
        row.push(1);
      } else {
        row.push(Math.random() < 0.15 ? 1 : 0);
      }
    }
    m.push(row);
  }

  return m;
}

// 🔎 encontrar celda libre segura
function getFreeCell() {
  let x, y;
  do {
    x = Math.floor(Math.random() * N);
    y = Math.floor(Math.random() * N);
  } while (map[y][x] === 1);

  return {x, y};
}

function init() {
  map = generateMap();

  pacman = getFreeCell();

  ghosts = [
    getFreeCell(),
    getFreeCell(),
    getFreeCell(),
    getFreeCell()
  ];

  gameOver = false;
  document.getElementById("msg").innerText = "";
}

// 🎮 DIBUJO (clave del problema)
function draw() {
  game.innerHTML = "";

  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {

      const cell = document.createElement("div");
      cell.classList.add("cell");

      if (map[y][x] === 1) {
        cell.classList.add("wall");
      } else {
        cell.classList.add("dot");
      }

      if (pacman.x === x && pacman.y === y) {
        cell.classList.add("pacman");
      }

      ghosts.forEach(g => {
        if (g.x === x && g.y === y) {
          cell.classList.add("ghost");
        }
      });

      game.appendChild(cell);
    }
  }
}

// 👻 movimiento simple
function moveGhosts() {
  ghosts.forEach(g => {
    const dirs = [
      {x:0,y:1},{x:0,y:-1},{x:1,y:0},{x:-1,y:0}
    ];

    const d = dirs[Math.floor(Math.random()*4)];
    const nx = g.x + d.x;
    const ny = g.y + d.y;

    if (map[ny] && map[ny][nx] !== 1) {
      g.x = nx;
      g.y = ny;
    }
  });
}

// 💀 choque
function checkDeath() {
  ghosts.forEach(g => {
    if (g.x === pacman.x && g.y === pacman.y) {
      document.getElementById("msg").innerText = "💀 Hacienda te ha pillado";
      gameOver = true;
    }
  });
}

// 🎮 control
document.addEventListener("keydown", e => {
  if (gameOver) return;

  let nx = pacman.x;
  let ny = pacman.y;

  if (e.key === "ArrowUp") ny--;
  if (e.key === "ArrowDown") ny++;
  if (e.key === "ArrowLeft") nx--;
  if (e.key === "ArrowRight") nx++;

  if (map[ny] && map[ny][nx] !== 1) {
    pacman.x = nx;
    pacman.y = ny;
  }

  draw();
});

// loop
setInterval(() => {
  if (!gameOver) {
    moveGhosts();
    checkDeath();
    draw();
  }
}, 200);

// start
init();
draw();
</script>

</body>
</html>
