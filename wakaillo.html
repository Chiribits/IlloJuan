<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pacman IlloJuan vs Hacienda</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

#game {
  display: grid;
  margin: 20px auto;
  width: fit-content;
}

.cell {
  width: 24px;
  height: 24px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.wall { background: #1e3a8a; }

.dot { color: white; font-size: 10px; }

.ghost { font-size: 18px; }

h2 { margin: 5px; }
</style>
</head>

<body>

<h1>🟡 Pac-Man IlloJuan vs Hacienda</h1>
<h2 id="levelText">Nivel 1</h2>

<div id="game"></div>
<p id="msg"></p>

<script>
let level = 1;
let map;
let pacman;
let ghosts;
let gameOver = false;

const game = document.getElementById("game");
const levelText = document.getElementById("levelText");

// 📏 tamaño según nivel
function getSize(level) {
  if (level === 1) return 13;
  if (level === 2) return 17;
  return 21;
}

// 🧱 generar mapa con puntos (AHORA SÍ FUNCIONA BIEN)
function initLevel() {
  const size = getSize(level);

  map = [];

  for (let y = 0; y < size; y++) {
    let row = [];

    for (let x = 0; x < size; x++) {

      // 🧱 bordes siempre pared
      if (x === 0 || y === 0 || x === size - 1 || y === size - 1) {
        row.push(1);
      }

      // 🧱 paredes internas (laberinto simple)
      else if (
        (x % 4 === 0 && y % 2 === 0) ||   // columnas tipo muro
        (y % 4 === 0 && x % 3 === 0)      // filas tipo muro
      ) {
        row.push(1);
      }

      // 🍒 puntos
      else {
        row.push(0);
      }
    }

    map.push(row);
  }

  pacman = { x: 1, y: 1 };

  ghosts = [];

  const ghostCount = 1 + Math.floor(level / 2);

  for (let i = 0; i < ghostCount; i++) {
    ghosts.push({
      x: size - 2 - i,
      y: size - 2
    });
  }

  gameOver = false;
  document.getElementById("msg").innerText = "";
  levelText.innerText = "Nivel " + level;
}

// 🎨 dibujar mapa
function draw() {
  game.innerHTML = "";

  const size = map.length;
  game.style.gridTemplateColumns = `repeat(${size}, 24px)`;

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {

      const cell = document.createElement("div");
      cell.classList.add("cell");

      // 🧱 pared
      if (map[y][x] === 1) {
        cell.classList.add("wall");
      }

      // 🍒 punto
      else if (map[y][x] === 0) {
        cell.classList.add("dot");
        cell.innerText = "•";
      }

      // 🍽️ comer
      else {
        cell.innerText = "";
      }

      // 🟡 ILLOJUAN (Pacman)
      if (pacman.x === x && pacman.y === y) {
        const img = document.createElement("img");
        img.src = "https://www.image2url.com/r2/default/images/1776789635981-88a1922c-16f5-4859-95b7-537d4a857215.png";
        img.style.width = "22px";
        img.style.height = "22px";

        cell.innerHTML = "";
        cell.appendChild(img);
      }

      // 👻 Hacienda
      ghosts.forEach(g => {
        if (g.x === x && g.y === y) {
          cell.classList.add("ghost");
          cell.innerText = "🏛️";
        }
      });

      game.appendChild(cell);
    }
  }
}

// 🍒 comer puntos
function eat() {
  if (map[pacman.y][pacman.x] === 0) {
    map[pacman.y][pacman.x] = 2;
  }
}

// 👻 fantasmas
function moveGhosts() {
  const dirs = [
    {x:0,y:1},{x:0,y:-1},{x:1,y:0},{x:-1,y:0}
  ];

  ghosts.forEach(g => {
    const d = dirs[Math.floor(Math.random() * 4)];
    const nx = g.x + d.x;
    const ny = g.y + d.y;

    if (map[ny] && map[ny][nx] !== 1) {
      g.x = nx;
      g.y = ny;
    }
  });
}

// 💀 muerte
function checkDeath() {
  ghosts.forEach(g => {
    if (g.x === pacman.x && g.y === pacman.y) {
      document.getElementById("msg").innerText = "💀 Hacienda te ha pillado";
      gameOver = true;
    }
  });
}

// 🏁 win
function checkWin() {
  for (let y = 0; y < map.length; y++) {
    for (let x = 0; x < map.length; x++) {
      if (map[y][x] === 0) return;
    }
  }

  level++;
  document.getElementById("msg").innerText = "🎉 Nivel completado";

  setTimeout(() => {
    initLevel();
    draw();
  }, 1000);
}

// 🎮 controles
document.addEventListener("keydown", e => {
  if (gameOver) return;

  let nx = pacman.x;
  let ny = pacman.y;

  if (e.key === "ArrowUp") ny--;
  if (e.key === "ArrowDown") ny++;
  if (e.key === "ArrowLeft") nx--;
  if (e.key === "ArrowRight") nx++;

  if (map[ny] && map[ny][nx] !== 1) {
    pacman.x = nx;
    pacman.y = ny;
    eat();
  }

  draw();
  checkWin();
});

// 🔁 loop
setInterval(() => {
  if (!gameOver) {
    moveGhosts();
    checkDeath();
    draw();
  }
}, 180);

// 🚀 start
initLevel();
draw();
</script>

</body>
</html>
