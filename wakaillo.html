<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pacman IlloJuan vs Hacienda</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

#game {
  display: grid;
  grid-template-columns: repeat(21, 26px);
  grid-template-rows: repeat(21, 26px);
  margin: 20px auto;
  width: fit-content;
}

.cell {
  width: 26px;
  height: 26px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.wall { background: #1e3a8a; }

.dot { color: white; font-size: 10px; }

.pacman { font-size: 18px; }

.ghost { font-size: 18px; }
</style>
</head>

<body>

<h1>🟡 Pac-Man IlloJuan vs Hacienda</h1>
<h2 id="levelText">Nivel 1</h2>

<div id="game"></div>
<p id="msg"></p>

<script>
const N = 21;

let map;
let pacman;
let ghosts;
let gameOver = false;
let level = 1;

const game = document.getElementById("game");
const levelText = document.getElementById("levelText");

// 🧱 MAPA MÁS DIFÍCIL POR NIVEL
function generateMap(level) {
  let m = [];

  for (let y = 0; y < N; y++) {
    let row = [];

    for (let x = 0; x < N; x++) {

      if (x === 0 || y === 0 || x === N-1 || y === N-1) {
        row.push(1);
      } else {
        let density = 0.08 + level * 0.03;
        row.push(Math.random() < density ? 1 : 0);
      }
    }

    m.push(row);
  }

  return m;
}

// 🔎 celda libre
function freeCell() {
  let x, y;
  do {
    x = Math.floor(Math.random() * N);
    y = Math.floor(Math.random() * N);
  } while (map[y][x] === 1);

  return {x, y};
}

// 👻 fantasmas según nivel
function spawnGhosts(level) {
  let count = 1;

  if (level >= 2) count = 2;
  if (level >= 3) count = 4;

  let arr = [];

  for (let i = 0; i < count; i++) {
    arr.push(freeCell());
  }

  return arr;
}

function initLevel() {
  map = generateMap(level);

  pacman = freeCell();
  ghosts = spawnGhosts(level);

  gameOver = false;

  levelText.innerText = "Nivel " + level;
  document.getElementById("msg").innerText = "";
}

// 🎮 DIBUJAR
function draw() {
  game.innerHTML = "";

  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {

      const cell = document.createElement("div");
      cell.classList.add("cell");

      if (map[y][x] === 1) {
        cell.classList.add("wall");
      } else {
        cell.classList.add("dot");
        cell.innerText = "•";
      }

      if (pacman.x === x && pacman.y === y) {
        cell.classList.add("pacman");
        cell.innerText = "🟡";
      }

      ghosts.forEach(g => {
        if (g.x === x && g.y === y) {
          cell.classList.add("ghost");
          cell.innerText = "🏛️";
        }
      });

      game.appendChild(cell);
    }
  }
}

// 👻 movimiento fantasmas
function moveGhosts() {
  ghosts.forEach(g => {
    const dirs = [
      {x:0,y:1},{x:0,y:-1},{x:1,y:0},{x:-1,y:0}
    ];

    const d = dirs[Math.floor(Math.random()*4)];
    const nx = g.x + d.x;
    const ny = g.y + d.y;

    if (map[ny] && map[ny][nx] !== 1) {
      g.x = nx;
      g.y = ny;
    }
  });
}

// 💀 muerte
function checkDeath() {
  ghosts.forEach(g => {
    if (g.x === pacman.x && g.y === pacman.y) {
      document.getElementById("msg").innerText = "💀 Hacienda te ha pillado";
      gameOver = true;
    }
  });
}

// 🍒 comer puntos
function eat() {
  if (map[pacman.y][pacman.x] === 0) {
    map[pacman.y][pacman.x] = 2;
  }
}

// 🏁 comprobar nivel completado
function checkWin() {
  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {
      if (map[y][x] === 0) return;
    }
  }

  level++;

  document.getElementById("msg").innerText =
    "🎉 Nivel completado! Subiendo dificultad...";

  setTimeout(() => {
    initLevel();
    draw();
  }, 1000);
}

// 🎮 control
document.addEventListener("keydown", e => {
  if (gameOver) return;

  let nx = pacman.x;
  let ny = pacman.y;

  if (e.key === "ArrowUp") ny--;
  if (e.key === "ArrowDown") ny++;
  if (e.key === "ArrowLeft") nx--;
  if (e.key === "ArrowRight") nx++;

  if (map[ny] && map[ny][nx] !== 1) {
    pacman.x = nx;
    pacman.y = ny;
    eat();
  }

  draw();
  checkWin();
});

// loop
setInterval(() => {
  if (!gameOver) {
    moveGhosts();
    checkDeath();
    draw();
  }
}, 180);

// start
initLevel();
draw();
</script>

</body>
</html>
