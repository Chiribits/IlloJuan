<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pacman IlloJuan vs Hacienda</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

#game {
  display: grid;
  margin: 20px auto;
  width: fit-content;
}

.cell {
  display: flex;
  justify-content: center;
  align-items: center;
}

.wall { background: #1e3a8a; }

.dot { color: white; font-size: 10px; }

.pacman { font-size: 18px; }

.ghost { font-size: 18px; }

h2 { margin: 5px; }
</style>
</head>

<body>

<h1>🟡 Pac-Man IlloJuan vs Hacienda</h1>
<h2 id="levelText">Nivel 1</h2>

<div id="game"></div>
<p id="msg"></p>

<script>
let level = 1;

let map;
let pacman;
let ghosts;
let gameOver = false;

const game = document.getElementById("game");
const levelText = document.getElementById("levelText");

// 📏 tamaño según nivel
function getSize(level) {
  if (level === 1) return 13;
  if (level === 2) return 17;
  return 21;
}

// 🧱 generar mapa según nivel
function generateMap(size, level) {
  let m = [];

  for (let y = 0; y < size; y++) {
    let row = [];

    for (let x = 0; x < size; x++) {

      if (x === 0 || y === 0 || x === size-1 || y === size-1) {
        row.push(1);
      } else {
        let density = 0.06 + level * 0.03;
        row.push(Math.random() < density ? 1 : 0);
      }
    }

    m.push(row);
  }

  return m;
}

// 🔎 celda libre
function freeCell(size) {
  let x, y;
  do {
    x = Math.floor(Math.random() * size);
    y = Math.floor(Math.random() * size);
  } while (map[y][x] === 1);

  return {x, y};
}

// 👻 fantasmas según nivel
function spawnGhosts(size, level) {
  let count = level === 1 ? 1 : level === 2 ? 2 : 4;

  let arr = [];
  for (let i = 0; i < count; i++) {
    arr.push(freeCell(size));
  }

  return arr;
}

// 🚀 iniciar nivel
function initLevel() {
  const size = getSize(level);

  map = generateMap(size, level);

  pacman = freeCell(size);
  ghosts = spawnGhosts(size, level);

  gameOver = false;

  levelText.innerText = "Nivel " + level;

  game.style.gridTemplateColumns = `repeat(${size}, 26px)`;
  game.style.gridTemplateRows = `repeat(${size}, 26px)`;

  document.getElementById("msg").innerText = "";
}

// 🎮 dibujar
function draw() {
  const size = map.length;
  game.innerHTML = "";

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {

      const cell = document.createElement("div");
      cell.classList.add("cell");

      if (map[y][x] === 1) {
        cell.classList.add("wall");
      } else {
        cell.classList.add("dot");
        cell.innerText = "•";
      }

      if (pacman.x === x && pacman.y === y) {
        cell.classList.add("pacman");
        cell.innerText = "🟡";
      }

      ghosts.forEach(g => {
        if (g.x === x && g.y === y) {
          cell.classList.add("ghost");
          cell.innerText = "🏛️";
        }
      });

      game.appendChild(cell);
    }
  }
}

// 👻 fantasmas
function moveGhosts() {
  const size = map.length;

  ghosts.forEach(g => {
    const dirs = [
      {x:0,y:1},{x:0,y:-1},{x:1,y:0},{x:-1,y:0}
    ];

    const d = dirs[Math.floor(Math.random()*4)];
    const nx = g.x + d.x;
    const ny = g.y + d.y;

    if (map[ny] && map[ny][nx] !== 1) {
      g.x = nx;
      g.y = ny;
    }
  });
}

// 💀 muerte
function checkDeath() {
  ghosts.forEach(g => {
    if (g.x === pacman.x && g.y === pacman.y) {
      document.getElementById("msg").innerText = "💀 Hacienda te ha pillado";
      gameOver = true;
    }
  });
}

// 🍒 comer
function eat() {
  if (map[pacman.y][pacman.x] === 0) {
    map[pacman.y][pacman.x] = 2;
  }
}

// 🏁 win
function checkWin() {
  for (let y = 0; y < map.length; y++) {
    for (let x = 0; x < map.length; x++) {
      if (map[y][x] === 0) return;
    }
  }

  level++;

  document.getElementById("msg").innerText =
    "🎉 Nivel completado";

  setTimeout(() => {
    initLevel();
    draw();
  }, 1000);
}

// 🎮 control
document.addEventListener("keydown", e => {
  if (gameOver) return;

  let nx = pacman.x;
  let ny = pacman.y;

  if (e.key === "ArrowUp") ny--;
  if (e.key === "ArrowDown") ny++;
  if (e.key === "ArrowLeft") nx--;
  if (e.key === "ArrowRight") nx++;

  if (map[ny] && map[ny][nx] !== 1) {
    pacman.x = nx;
    pacman.y = ny;
    eat();
  }

  draw();
  checkWin();
});

// loop
setInterval(() => {
  if (!gameOver) {
    moveGhosts();
    checkDeath();
    draw();
  }
}, 180);

// start
initLevel();
draw();
</script>

</body>
</html>
