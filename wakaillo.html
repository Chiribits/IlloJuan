<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pacman IlloJuan Edition</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

#game {
  display: grid;
  grid-template-columns: repeat(21, 28px);
  grid-template-rows: repeat(21, 28px);
  margin: 20px auto;
  width: fit-content;
}

.cell {
  width: 28px;
  height: 28px;
}

.wall {
  background: #1e3a8a;
}

.dot {
  background: black;
  position: relative;
}

.dot::after {
  content: "";
  width: 5px;
  height: 5px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 11px;
  left: 11px;
}

/* 🟡 PACMAN ILLOJUAN */
.pacman {
  background-image: url("https://upload.wikimedia.org/wikipedia/commons/8/8b/Logo_de_IlloJuan.png");
  background-size: cover;
  border-radius: 50%;
}

/* 👻 HACIENDA */
.ghost {
  background-image: url("https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Agencia_Tributaria_logo.svg/2048px-Agencia_Tributaria_logo.svg.png");
  background-size: cover;
  border-radius: 50%;
}

button {
  padding: 8px;
  margin-top: 10px;
  display: none;
}
</style>
</head>

<body>

<h1>🟡 Pac-Man IlloJuan vs Hacienda</h1>

<div id="game"></div>
<p id="msg"></p>
<button id="restartBtn" onclick="resetGame()">🔄 Volver a empezar</button>

<script>
const N = 21;

let map;
let pacman;
let ghosts;
let gameOver = false;

const game = document.getElementById("game");

// 🧠 MAPA ALEATORIO
function generateMap(size) {
  let m = [];

  for (let y = 0; y < size; y++) {
    let row = [];

    for (let x = 0; x < size; x++) {

      if (x === 0 || y === 0 || x === size-1 || y === size-1) {
        row.push(1);
      }
      else if (Math.random() < 0.18) {
        row.push(1); // paredes random
      }
      else {
        row.push(0); // puntos
      }
    }

    m.push(row);
  }

  return m;
}

// 👻 FANTASMAS (4)
function spawnGhosts() {
  return [
    { x: 19, y: 1 },
    { x: 1, y: 19 },
    { x: 19, y: 19 },
    { x: 10, y: 10 }
  ];
}

function initState() {
  map = generateMap(N);

  pacman = { x: 1, y: 1 };

  ghosts = spawnGhosts();

  gameOver = false;

  document.getElementById("msg").innerText = "";
  document.getElementById("restartBtn").style.display = "none";
}

// 🎮 DIBUJAR
function draw() {
  game.innerHTML = "";

  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {

      const cell = document.createElement("div");
      cell.classList.add("cell");

      if (map[y][x] === 1) {
        cell.classList.add("wall");
      } 
      else {
        cell.classList.add("dot");
      }

      if (pacman.x === x && pacman.y === y) {
        cell.classList.add("pacman");
      }

      ghosts.forEach(g => {
        if (g.x === x && g.y === y) {
          cell.classList.add("ghost");
        }
      });

      game.appendChild(cell);
    }
  }
}

// 👻 MOVIMIENTO FANTASMAS
function moveGhosts() {
  ghosts.forEach(g => {
    const dirs = [
      {x:0,y:1},
      {x:0,y:-1},
      {x:1,y:0},
      {x:-1,y:0}
    ];

    const d = dirs[Math.floor(Math.random() * 4)];
    const nx = g.x + d.x;
    const ny = g.y + d.y;

    if (map[ny][nx] !== 1) {
      g.x = nx;
      g.y = ny;
    }
  });
}

// 💀 MUERTE
function checkDeath() {
  ghosts.forEach(g => {
    if (g.x === pacman.x && g.y === pacman.y) {
      endGame("💀 Hacienda te ha pillado");
    }
  });
}

// 🏆 WIN
function checkWin() {
  let dots = 0;

  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {
      if (map[y][x] === 0) dots++;
    }
  }

  if (dots === 0) {
    endGame("🎉 IlloJuan ha escapado de Hacienda!");
  }
}

function endGame(text) {
  gameOver = true;
  document.getElementById("msg").innerText = text;
  document.getElementById("restartBtn").style.display = "inline-block";
}

// 🎮 MOVIMIENTO PACMAN
document.addEventListener("keydown", (e) => {
  if (gameOver) return;

  let nx = pacman.x;
  let ny = pacman.y;

  if (e.key === "ArrowUp") ny--;
  if (e.key === "ArrowDown") ny++;
  if (e.key === "ArrowLeft") nx--;
  if (e.key === "ArrowRight") nx++;

  if (map[ny][nx] !== 1) {
    pacman.x = nx;
    pacman.y = ny;

    if (map[ny][nx] === 0) {
      map[ny][nx] = 2;
    }
  }

  draw();
  checkWin();
});

// 🔁 LOOP
function loop() {
  if (!gameOver) {
    moveGhosts();
    draw();
    checkDeath();
  }
}

function resetGame() {
  initState();
  draw();
}

// INIT
initState();
draw();
setInterval(loop, 250);
</script>

</body>
</html>
