<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pacman IlloJuan Edition</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

#game {
  display: grid;
  grid-template-columns: repeat(21, 28px);
  grid-template-rows: repeat(21, 28px);
  margin: 20px auto;
  width: fit-content;
}

.cell { width: 28px; height: 28px; }

.wall { background: #1e3a8a; }

.dot {
  background: black;
  position: relative;
}

.dot::after {
  content: "";
  width: 5px;
  height: 5px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 11px;
  left: 11px;
}

.pacman {
  background-image: url("https://upload.wikimedia.org/wikipedia/commons/8/8b/Logo_de_IlloJuan.png");
  background-size: cover;
  border-radius: 50%;
}

.ghost {
  background-image: url("https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Agencia_Tributaria_logo.svg/2048px-Agencia_Tributaria_logo.svg.png");
  background-size: cover;
  border-radius: 50%;
}

button { display:none; margin-top:10px; padding:8px; }
</style>
</head>

<body>

<h1>🟡 Pac-Man IlloJuan vs Hacienda</h1>

<div id="game"></div>
<p id="msg"></p>
<button id="restartBtn" onclick="resetGame()">🔄 Volver a empezar</button>

<script>
const N = 21;

let map, pacman, ghosts, gameOver;

const game = document.getElementById("game");

// 🔧 MAPA SEGURO (SIN BLOQUEAR SPAWN)
function generateMap() {
  const m = [];

  for (let y = 0; y < N; y++) {
    const row = [];
    for (let x = 0; x < N; x++) {

      if (x === 0 || y === 0 || x === N-1 || y === N-1) {
        row.push(1);
      }
      else {
        // menos densidad = más jugable
        row.push(Math.random() < 0.12 ? 1 : 0);
      }
    }
    m.push(row);
  }

  return m;
}

// 🔧 BUSCAR CELDA LIBRE
function findFreeCell() {
  let x, y;
  do {
    x = Math.floor(Math.random() * N);
    y = Math.floor(Math.random() * N);
  } while (map[y][x] === 1);

  return {x, y};
}

function initState() {
  map = generateMap();

  pacman = findFreeCell();

  ghosts = [
    findFreeCell(),
    findFreeCell(),
    findFreeCell(),
    findFreeCell()
  ];

  gameOver = false;

  document.getElementById("msg").innerText = "";
  document.getElementById("restartBtn").style.display = "none";
}

// 🎮 DIBUJO
function draw() {
  game.innerHTML = "";

  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {

      const cell = document.createElement("div");
      cell.classList.add("cell");

      if (map[y][x] === 1) {
        cell.classList.add("wall");
      } else {
        cell.classList.add("dot");
      }

      if (pacman.x === x && pacman.y === y) {
        cell.classList.add("pacman");
      }

      ghosts.forEach(g => {
        if (g.x === x && g.y === y) {
          cell.classList.add("ghost");
        }
      });

      game.appendChild(cell);
    }
  }
}

// 👻 FANTASMAS
function moveGhosts() {
  ghosts.forEach(g => {
    const dirs = [
      {x:0,y:1},{x:0,y:-1},{x:1,y:0},{x:-1,y:0}
    ];

    const d = dirs[Math.floor(Math.random()*4)];
    const nx = g.x + d.x;
    const ny = g.y + d.y;

    if (map[ny] && map[ny][nx] !== 1) {
      g.x = nx;
      g.y = ny;
    }
  });
}

// 💀 MUERTE
function checkDeath() {
  ghosts.forEach(g => {
    if (g.x === pacman.x && g.y === pacman.y) {
      endGame("💀 Hacienda te ha pillado");
    }
  });
}

// 🏆 WIN
function checkWin() {
  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {
      if (map[y][x] === 0) return;
    }
  }
  endGame("🎉 IlloJuan ha escapado de Hacienda!");
}

function endGame(text) {
  gameOver = true;
  document.getElementById("msg").innerText = text;
  document.getElementById("restartBtn").style.display = "inline-block";
}

// 🎮 CONTROL
document.addEventListener("keydown", e => {
  if (gameOver) return;

  let nx = pacman.x;
  let ny = pacman.y;

  if (e.key === "ArrowUp") ny--;
  if (e.key === "ArrowDown") ny++;
  if (e.key === "ArrowLeft") nx--;
  if (e.key === "ArrowRight") nx++;

  if (map[ny] && map[ny][nx] !== 1) {
    pacman.x = nx;
    pacman.y = ny;

    if (map[ny][nx] === 0) map[ny][nx] = 2;
  }

  draw();
  checkWin();
});

// LOOP
function loop() {
  if (!gameOver) {
    moveGhosts();
    draw();
    checkDeath();
  }
}

function resetGame() {
  initState();
  draw();
}

// START
initState();
draw();
setInterval(loop, 220);
</script>

</body>
</html>
