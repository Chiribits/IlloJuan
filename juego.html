<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wordle Illojuan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0d0d0d;color:#f0f0f0;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:12px 8px}
h1{font-size:18px;font-weight:700;letter-spacing:3px;border-bottom:2px solid #ff4444;padding-bottom:8px;margin-bottom:4px;width:100%;text-align:center;color:#ff4444}
#sub{font-size:11px;color:#888;text-align:center;margin-bottom:12px;letter-spacing:1px}
#msg{height:28px;font-size:13px;font-weight:600;text-align:center;color:#f0f0f0;margin-bottom:8px}
#grid{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.row{display:flex;gap:5px}
.cell{width:52px;height:52px;border:2px solid #444;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;text-transform:uppercase;transition:background .3s,border .3s,color .3s;border-radius:4px;color:#f0f0f0}
.cell.filled{border-color:#888;animation:pop .1s ease}
.cell.correct{background:#538d4e;border-color:#538d4e;color:#fff}
.cell.present{background:#b59f3b;border-color:#b59f3b;color:#fff}
.cell.absent{background:#2a2a2a;border-color:#2a2a2a;color:#777}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.shake{animation:shake .4s ease}
#keyboard{display:flex;flex-direction:column;gap:6px;width:100%;max-width:340px}
.krow{display:flex;gap:4px;justify-content:center}
.key{height:48px;min-width:30px;padding:0 4px;border:none;border-radius:6px;background:#2a2a2a;color:#f0f0f0;font-size:13px;font-weight:600;cursor:pointer;flex:1;max-width:36px;transition:background .2s,color .2s}
.key.wide{max-width:54px;font-size:11px}
.key.correct{background:#538d4e;color:#fff}
.key.present{background:#b59f3b;color:#fff}
.key.absent{background:#1a1a1a;color:#444}
#hint{font-size:12px;color:#ff4444;text-align:center;min-height:18px;margin-bottom:6px;font-style:italic}
#new-btn{margin-top:16px;padding:10px 24px;background:#ff4444;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;display:none}
</style>
</head>
<body>
<h1>WORDLE ILLOJUAN</h1>
<div id="sub">EDICIÓN PEKEÑO SALTAMONTES</div>
<div id="msg">Adivina la palabra de 5 letras</div>
<div id="hint"></div>
<div id="grid"></div>
<div id="keyboard"></div>
<button id="new-btn" onclick="init()">Otra palabra, tio</button>

<script>
const WORDS = [
{w:"PECHA",h:"Significa mucho"},
{w:"CRACK",h:"Jugador bueno"},
{w:"TOCHO",h:"Algo grande"},
{w:"CHONI",h:"Persona cutre"},
{w:"CUTRE",h:"De mala calidad"},
{w:"MANCO",h:"Juega fatal"},
{w:"SALAO",h:"Gracioso"},
{w:"BIRRA",h:"Cerveza"},
{w:"FICHA",h:"Elemento"},
{w:"TROZO",h:"Pedazo"},
{w:"BOCAS",h:"Habla mucho"},
{w:"PASTA",h:"Dinero"},
{w:"GRASA",h:"Cutre"},
{w:"CHULO",h:"Creído"},
{w:"FRIKI",h:"Fanático"},
{w:"GORDO",h:"Insulto típico"},
{w:"TONTO",h:"Clásico"},
{w:"PISHA",h:"Andaluz"},
{w:"MOLAR",h:"Estar guay"},
{w:"JEFES",h:"Los que molan"},
{w:"VAMOS",h:"Ánimo"},
{w:"CHAT",h:"Directo"},
{w:"BANEO",h:"Expulsión"},
{w:"SPAM",h:"Repetición"},
{w:"LLORO",h:"Drama"},
{w:"HYPE",h:"Expectación"},
{w:"TILT",h:"Enfado"},
{w:"RAGE",h:"Rabia"},
{w:"NOOB",h:"Principiante"},
{w:"PRO",h:"Bueno"},
{w:"META",h:"Eficiente"},
{w:"NERF",h:"Debuff"},
{w:"BUFF",h:"Mejora"},
{w:"CLUTCH",h:"Jugada clave"},
{w:"FLAMA",h:"Muy bueno"},
{w:"FLIPAR",h:"Alucinar"},
{w:"HOSTIA",h:"Sorpresa"}
].filter(e=>e.w.length===5);

const ROWS=6,COLS=5;
let secret,board,cur,gameOver,keyState;

function init(){
  const entry=WORDS[Math.floor(Math.random()*WORDS.length)];
  secret=entry.w;
  document.getElementById('hint').textContent='Pista: '+entry.h;
  board=Array.from({length:ROWS},()=>Array(COLS).fill(''));
  cur={row:0,col:0};
  gameOver=false;
  keyState={};
  document.getElementById('new-btn').style.display='none';
  document.getElementById('msg').textContent='Adivina la palabra de 5 letras';
  buildGrid();
  buildKeyboard();
}

function buildGrid(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  for(let r=0;r<ROWS;r++){
    const row=document.createElement('div');
    row.className='row';row.id='row-'+r;
    for(let c=0;c<COLS;c++){
      const cell=document.createElement('div');
      cell.className='cell';cell.id=`c-${r}-${c}`;
      row.appendChild(cell);
    }
    g.appendChild(row);
  }
}

const LAYOUT=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L','Ñ'],['↵','Z','X','C','V','B','N','M','⌫']];

function buildKeyboard(){
  const kb=document.getElementById('keyboard');
  kb.innerHTML='';
  LAYOUT.forEach(row=>{
    const div=document.createElement('div');
    div.className='krow';
    row.forEach(k=>{
      const btn=document.createElement('button');
      btn.className='key'+((k==='↵'||k==='⌫')?' wide':'');
      btn.textContent=k;
      btn.id='key-'+k;
      btn.onclick=()=>handleKey(k);
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}

function handleKey(k){
  if(gameOver)return;

  if(k==='⌫'){
    if(cur.col>0){
      cur.col--;
      board[cur.row][cur.col]='';
      updateCell(cur.row,cur.col,'',false);
    }
  }
  else if(k==='↵'){
    submitRow();
  }
  else if(cur.col<COLS){
    board[cur.row][cur.col]=k;
    updateCell(cur.row,cur.col,k,true);
    cur.col++;
  }
}

function updateCell(r,c,l,f){
  const cell=document.getElementById(`c-${r}-${c}`);
  cell.textContent=l;
  cell.className='cell'+(f?' filled':'');
}

function submitRow(){
  if(cur.col<COLS){shake();return;}

  const guess=board[cur.row].join('');
  const result=score(guess,secret);

  result.forEach((res,c)=>{
    setTimeout(()=>{
      const cell=document.getElementById(`c-${cur.row}-${c}`);
      cell.classList.add(res);
      updateKey(board[cur.row][c],res);
    },c*120);
  });

  setTimeout(()=>{
    if(guess===secret){
      document.getElementById('msg').textContent='¡Has ganado!';
      gameOver=true;
      document.getElementById('new-btn').style.display='block';
    }else if(cur.row===ROWS-1){
      document.getElementById('msg').textContent='Era '+secret;
      gameOver=true;
      document.getElementById('new-btn').style.display='block';
    }else{
      cur.row++;cur.col=0;
    }
  },700);
}

function score(guess, secret){
  const res=Array(COLS).fill('absent');
  const g=guess.split('');
  const s=secret.split('');
  const usedS=Array(COLS).fill(false);

  for(let i=0;i<COLS;i++){
    if(g[i]===s[i]){
      res[i]='correct';
      usedS[i]=true;
    }
  }

  for(let i=0;i<COLS;i++){
    if(res[i]==='correct')continue;
    for(let j=0;j<COLS;j++){
      if(!usedS[j] && g[i]===s[j]){
        res[i]='present';
        usedS[j]=true;
        break;
      }
    }
  }

  return res;
}

function updateKey(l,state){
  const priority={correct:3,present:2,absent:1};
  if(!keyState[l]||priority[state]>priority[keyState[l]]){
    keyState[l]=state;
    const btn=document.getElementById('key-'+l);
    if(btn)btn.className='key '+state;
  }
}

function shake(){
  const row=document.getElementById('row-'+cur.row);
  row.classList.add('shake');
  setTimeout(()=>row.classList.remove('shake'),400);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter')handleKey('↵');
  else if(e.key==='Backspace')handleKey('⌫');
  else handleKey(e.key.toUpperCase());
});

init();
</script>
</body>
</html>
