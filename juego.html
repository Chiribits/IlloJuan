<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wordle Illojuan</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0d0d0d;color:#f0f0f0;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:12px 8px}

h1{font-size:18px;font-weight:700;letter-spacing:3px;border-bottom:2px solid #ff4444;padding-bottom:8px;margin-bottom:4px;width:100%;text-align:center;color:#ff4444}

#sub{font-size:11px;color:#888;text-align:center;margin-bottom:12px}
#msg{height:28px;font-size:13px;font-weight:600;text-align:center;margin-bottom:8px}
#hint{font-size:12px;color:#ff4444;text-align:center;margin-bottom:6px;font-style:italic}

#grid{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.row{display:flex;gap:5px}

.cell{
width:52px;height:52px;
border:2px solid #444;
display:flex;align-items:center;justify-content:center;
font-size:20px;font-weight:700;
text-transform:uppercase;
border-radius:4px;
color:#f0f0f0;
}

.cell.correct{background:#538d4e;border-color:#538d4e;color:#fff}
.cell.present{background:#b59f3b;border-color:#b59f3b;color:#fff}
.cell.absent{background:#2a2a2a;border-color:#2a2a2a;color:#777}

#keyboard{display:flex;flex-direction:column;gap:6px;width:100%;max-width:340px}
.krow{display:flex;gap:4px;justify-content:center}

.key{
height:48px;min-width:30px;
border:none;border-radius:6px;
background:#2a2a2a;
color:#f0f0f0;
font-weight:600;
cursor:pointer;
flex:1;
max-width:36px;
}

.key.correct{background:#538d4e}
.key.present{background:#b59f3b}
.key.absent{background:#1a1a1a;color:#444}

#new-btn{
margin-top:16px;
padding:10px 24px;
background:#ff4444;
color:#fff;
border:none;
border-radius:8px;
font-size:15px;
font-weight:600;
cursor:pointer;
display:none;
}

@keyframes shake{
0%,100%{transform:translateX(0)}
20%,60%{transform:translateX(-4px)}
40%,80%{transform:translateX(4px)}
}
.shake{animation:shake .4s ease}
</style>
</head>

<body>

<h1>WORDLE ILLOJUAN</h1>
<div id="sub">EDICIÓN PEKEÑO SALTAMONTES</div>

<div id="msg">Adivina la palabra</div>
<div id="hint"></div>

<div id="grid"></div>
<div id="keyboard"></div>

<button id="new-btn" onclick="init()">Otra palabra, tio</button>

<script>
const WORDS = [
{w:"PECHA",h:"Significa “mucho” o una gran cantidad"},
{w:"LOCO",h:"Ojo, solo 4 letras... trampa"},
{w:"CRACK",h:"Como llama a los buenos jugadores"},
{w:"TOCHO",h:"Algo grande o pesado"},
{w:"CHONI",h:"Prototipo de persona cutre"},
{w:"CUTRE",h:"De mala calidad, vamos"},
{w:"MANCO",h:"El que juega fatal"},
{w:"SALAO",h:"Gracioso, con sal"},
{w:"BIRRA",h:"La bebida favorita del stream"},
{w:"FICHA",h:"Elemento del juego"},
{w:"TROZO",h:"Pedazo de algo (o de manco)"},
{w:"BOCAS",h:"El que habla mucho y hace poco"},
{w:"PASTA",h:"El dinero, la guita"},
{w:"GRASA",h:"Algo muy cutre o pesado"},
{w:"CHULO",h:"Que se cree mucho"},
{w:"BUENA",h:"Pues eso, buena"},
{w:"FRIKI",h:"Fanático de algo"},
{w:"GORDO",h:"Insulto cariñoso de Illojuan"},
{w:"TONTO",h:"Otro clásico del vocabulario"},
{w:"COLEGA",h:"Solo 6 letras... ojo"},
{w:"PISHA",h:"Forma andaluza de decir tío"},
{w:"RAROS",h:"Los que hacen cosas extrañas"},
{w:"MOLAR",h:"Cuando algo está guay"},
{w:"MADRE",h:"Como en '¡madre mía!'"},
{w:"TROLO",h:"Insulto clásico del stream"},
{w:"ZUMOS",h:"Bebida alternativa a la birra"},
{w:"LITERAL",h:"Se usa para enfatizar que algo es exactamente así, sin exageración"},
{w:"JEFES",h:"Así llama a los que molan"},
{w:"VAMOS",h:"Grito de ánimo en el stream"},
{w:"QUIYO",h:"Forma andaluza de llamar a alguien, tipo 'tío'"},
{w:"PAPEO",h:"Comida en general"},
{w:"SALSEO",h:"Cotilleo o drama"},
{w:"CLIP",h:"Momento gracioso del directo"},
{w:"STREAM",h:"El directo en Twitch"},
{w:"CHAT",h:"La gente del directo"},
{w:"BANEO",h:"Expulsión del chat"},
{w:"SPAM",h:"Mensajes repetidos"},
{w:"LLORO",h:"Reacción exagerada de risa o drama"},
{w:"HYPE",h:"Expectación máxima"},
{w:"TILT",h:"Cuando se enfada jugando"},
{w:"RAGE",h:"Enfado fuerte en juegos"},
{w:"GG",h:"'Good game', reconocimiento"},
{w:"NOOB",h:"Principiante o malo"},
{w:"PRO",h:"Muy bueno jugando"},
{w:"META",h:"Lo más eficiente del juego"},
{w:"NERF",h:"Cuando bajan algo de poder"},
{w:"BUFF",h:"Cuando mejoran algo"},
{w:"CLUTCH",h:"Jugada decisiva"},
{w:"DIOH",h:"Exclamación tipo 'Dios' muy andaluza"},
{w:"FLAMA",h:"Algo muy bueno o muy top"},
{w:"FLIPAO",h:"Alguien que se sorprende mucho"},
{w:"FLIPAR",h:"Quedarse loco con algo"},
{w:"COHONES",h:"Exclamación andaluza"},
{w:"HOSTIA",h:"Sorpresa o impacto"},
{w:"ENPLAN",h:"Muletilla"},
{w:"TOGUAPO",h:"Algo muy bueno"},
{w:"RANDOM",h:"Algo sin sentido"},
{w:"BROMA",h:"Troleo"}
];

let secret,board,cur,gameOver,keyState,COLS;

function init(){
const entry=WORDS[Math.floor(Math.random()*WORDS.length)];
secret=entry.w.toUpperCase();
COLS=secret.length;

document.getElementById('hint').textContent="Pista: "+entry.h;
document.getElementById('msg').textContent="Adivina la palabra";

board=Array.from({length:6},()=>Array(COLS).fill(''));
cur={row:0,col:0};
gameOver=false;
keyState={};

document.getElementById('new-btn').style.display='none';

buildGrid();
buildKeyboard();
}

function buildGrid(){
const g=document.getElementById('grid');
g.innerHTML='';

for(let r=0;r<6;r++){
const row=document.createElement('div');
row.className='row';
row.id=`row-${r}`;

for(let c=0;c<COLS;c++){
const cell=document.createElement('div');
cell.className='cell';
cell.id=`c-${r}-${c}`;
row.appendChild(cell);
}

g.appendChild(row);
}
}

const LAYOUT=[
['Q','W','E','R','T','Y','U','I','O','P'],
['A','S','D','F','G','H','J','K','L','Ñ'],
['↵','Z','X','C','V','B','N','M','⌫']
];

function buildKeyboard(){
const kb=document.getElementById('keyboard');
kb.innerHTML='';

LAYOUT.forEach(row=>{
const div=document.createElement('div');
div.className='krow';

row.forEach(k=>{
const btn=document.createElement('button');
btn.className='key';
btn.textContent=k;
btn.onclick=()=>handleKey(k);
div.appendChild(btn);
});

kb.appendChild(div);
});
}

function handleKey(k){
if(gameOver) return;

if(k==='⌫'){
if(cur.col>0){
cur.col--;
board[cur.row][cur.col]='';
updateCell(cur.row,cur.col,'');
}
return;
}

if(k==='↵'){
submit();
return;
}

if(cur.col<COLS){
board[cur.row][cur.col]=k;
updateCell(cur.row,cur.col,k);
cur.col++;
}
}

function updateCell(r,c,l){
document.getElementById(`c-${r}-${c}`).textContent=l;
}

function submit(){
if(cur.col<COLS){shake();return;}

const guess=board[cur.row].join('');

const res=score(guess,secret);

res.forEach((r,i)=>{
setTimeout(()=>{
const cell=document.getElementById(`c-${cur.row}-${i}`);
cell.classList.add(r);
updateKey(board[cur.row][i],r);
},i*120);
});

setTimeout(()=>{
if(guess===secret){
document.getElementById('msg').textContent='¡Ganaste!';
gameOver=true;
document.getElementById('new-btn').style.display='block';
}else{
cur.row++;
cur.col=0;
}
},700);
}

function score(g,s){
const res=Array(COLS).fill('absent');
const gg=g.split('');
const ss=s.split('');
const used=Array(COLS).fill(false);

for(let i=0;i<COLS;i++){
if(gg[i]===ss[i]){
res[i]='correct';
used[i]=true;
}
}

for(let i=0;i<COLS;i++){
if(res[i]==='correct') continue;
for(let j=0;j<COLS;j++){
if(!used[j] && gg[i]===ss[j]){
res[i]='present';
used[j]=true;
break;
}
}
}

return res;
}

function updateKey(l,state){
const btn=document.querySelectorAll('.key');
btn.forEach(b=>{
if(b.textContent===l){
b.classList.add(state);
}
});
}

function shake(){
document.getElementById(`row-${cur.row}`).classList.add('shake');
setTimeout(()=>{
document.getElementById(`row-${cur.row}`).classList.remove('shake');
},400);
}

document.addEventListener('keydown',e=>{
if(e.key==='Enter')handleKey('↵');
else if(e.key==='Backspace')handleKey('⌫');
else handleKey(e.key.toUpperCase());
});

init();
</script>

</body>
</html>
